name: Spark Local E2E

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: spark-local-e2e-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spark-local-e2e:
    name: Spark local unilateral-exit E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout recovery tool
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout upstream Spark
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: buildonspark/spark
          # Pinned so the E2E is reproducible; bump deliberately. buildonspark/spark
          # publishes no release tags, so this tracks a specific main commit.
          ref: b7b6011da8dc4bfad323e2278ebf4a5b3dba7a63
          path: upstream-spark

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # NOTE: magic-nix-cache is deprecated by Determinate Systems; migrate to
      # the installer's built-in FlakeHub cache. Pinned until then.
      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Install dependencies
        run: nix develop --command npm ci

      # make test-e2e starts the Spark local stack (auto-detected at
      # ./upstream-spark), waits for the operators, runs the E2E suite, dumps
      # logs on failure, and tears the stack down.
      - name: Run local unilateral-exit E2E
        run: nix develop --command make test-e2e
