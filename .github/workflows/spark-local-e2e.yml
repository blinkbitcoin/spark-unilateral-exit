name: Spark Local E2E

on:
  pull_request:
    branches:
      - main

concurrency:
  group: spark-local-e2e-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spark-local-e2e:
    name: Spark local unilateral-exit E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout recovery tool
        uses: actions/checkout@v4

      - name: Checkout upstream Spark
        uses: actions/checkout@v4
        with:
          repository: buildonspark/spark
          path: upstream-spark

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install dependencies
        run: nix develop --command npm ci

      # make test-e2e starts the Spark local stack (auto-detected at
      # ./upstream-spark), waits for the operators, runs the E2E suite, dumps
      # logs on failure, and tears the stack down.
      - name: Run local unilateral-exit E2E
        run: nix develop --command make test-e2e
