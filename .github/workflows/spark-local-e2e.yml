name: Spark Local E2E

on:
  pull_request:
    branches:
      - main

concurrency:
  group: spark-local-e2e-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spark-local-e2e:
    name: Spark local unilateral-exit E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout recovery tool
        uses: actions/checkout@v4

      - name: Checkout upstream Spark
        uses: actions/checkout@v4
        with:
          repository: buildonspark/spark
          path: upstream-spark

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install dependencies
        run: nix develop --command npm ci

      - name: Build and start Spark local stack
        working-directory: upstream-spark
        run: |
          docker compose \
            -f docker-compose.yml \
            -f ../scripts/spark-local-bitcoind29.override.yml \
            up -d --build postgres bitcoind bitcoin-init spark-operator-0 spark-operator-1 spark-operator-2
          docker compose ps

      - name: Wait for Spark operators
        run: |
          nix develop --command node scripts/wait-for-spark-local.mjs
          sleep 15

      - name: Run local unilateral-exit E2E
        env:
          SPARK_DANGEROUSLY_DISABLE_TLS_VERIFICATION: "true"
        run: nix develop --command npm run test:e2e

      - name: Dump Spark logs on failure
        if: failure()
        working-directory: upstream-spark
        run: docker compose logs --no-color --tail=300

      - name: Stop Spark local stack
        if: always()
        working-directory: upstream-spark
        run: |
          docker compose \
            -f docker-compose.yml \
            -f ../scripts/spark-local-bitcoind29.override.yml \
            down -v
