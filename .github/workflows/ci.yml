name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit
      - run: npm test
      - name: CLI smoke test
        run: |
          node src/cli.js plan \
            --bundle examples/recovery-bundle.example.json \
            --destination bc1qexampledestination0000 \
            --fee-rate 10 \
            --cpfp-utxo abababababababababababababababababababababababababababababababab:0:50000:0014abcd:02abcd
